# lifecycle.conf — config for the feature-lifecycle pipeline.
# Read by the `feature-lifecycle` skill and `.claude/workflows/feature-pipeline.js`.
# These are the STACK-SPECIFIC bits, so the same pipeline ports to any repo: point them
# at your project's real commands and the orchestrator stays identical.
#
# Every *_CMD must exit 0 on success and non-zero on failure (that's how it gates a stage).

# --- The implement gate (the oracle) ------------------------------------------------
# What must pass before "implement" is considered done. For a code repo this is your
# test suite + type check + lint; for THIS docs repo it's the strict build + parity checks.
TEST_CMD=".venv/bin/mkdocs build --strict -d /tmp/_fl_build && sh tests/check-skill-mirror.sh && sh tests/validate.sh"
LINT_CMD=""          # optional, e.g. "ruff check . && npx tsc --noEmit"
TYPECHECK_CMD=""     # optional

# --- Branch / VCS -------------------------------------------------------------------
BASE_BRANCH="main"
BRANCH_PREFIX="feat/"

# --- Circuit breakers (stop conditions) ---------------------------------------------
MAX_SPEC_ROUNDS=2          # spec → review → revise, at most N times
MAX_PLAN_ROUNDS=2
MAX_IMPLEMENT_ROUNDS=6     # implement → test-gate → fix, at most N times before surfacing to a human
MAX_REVIEW_ROUNDS=2

# --- Review gate --------------------------------------------------------------------
# In-loop reviewer is a fresh-context subagent. CodeRabbit + CI run later, on the PR.
REVIEW_SUBAGENT="code-reviewer"

# --- Human gates (where the pipeline pauses for a person) ---------------------------
# The workflow runs the autonomous stages and STOPS before opening the PR — a human
# reviews the branch + summary and opens/approves the PR (where CodeRabbit + CI run).
STOP_BEFORE_PR=true
