# Guardrail config for this repo's agent hooks (.agent/hooks/*).
# Sourced by test-gate.sh, format.sh, and git-safety.sh.

# This repo intentionally commits to main (solo, docs, trunk-based) — disable branch protection.
PROTECTED_BRANCHES=""

# "Tests" for a docs repo: strict site build (broken links/footnotes/nav) + skill-mirror parity.
# Build to a throwaway dir so the Stop gate never mutates the tracked site/ output.
TEST_CMD=".venv/bin/mkdocs build --strict -q -d /tmp/_mkdocs_gate && sh tests/check-skill-mirror.sh"

# No post-edit formatter wired (pre-commit handles whitespace/EOF/JSON).
FORMAT_CMD=""
