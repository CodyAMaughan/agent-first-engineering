# .agent/budget.conf — per-task cost-budget guardrail for the Workflow orchestrator.
# Read by .claude/workflows/lib/budget-breaker.js (via budget-config.js). Absent file OR
# BUDGET_ENABLED=false ⇒ no enforcement, behavior unchanged (opt-in, SC-005).
#
# Conservative defaults (the clarified decision): low enough to halt a runaway, user-tunable,
# with a soft alert before the hard abort. The motivating ~4h qa-loop would trip PERTASK_HARD_USD
# or ITERATION_CAP long before 4 hours. Raise these per repo as needed (FR-022, SC-007).
BUDGET_ENABLED=true

# Per-task ceilings (notional USD at API rates; soft alerts, hard aborts). soft MUST be < hard.
PERTASK_SOFT_USD=3.00      # alert, continue
PERTASK_HARD_USD=5.00      # abort the run
# PERTASK_HARD_TOKENS=2000000   # optional per-task token ceiling

# Aggregate ceiling across all tasks in one workflow run (>= PERTASK_HARD_USD).
PERWORKFLOW_HARD_USD=15.00

# Catch slow loops of cheap steps before excessive wall-clock time (independent of cost).
ITERATION_CAP=40

# Pricing — maintained external table, never hardcoded. Fail-safe: never $0 on a miss.
PRICE_TABLE_SOURCE=litellm
PRICE_TABLE_MAX_AGE_HOURS=168
PRICE_TABLE_FALLBACK=assume-max   # block | assume-max | warn-continue
