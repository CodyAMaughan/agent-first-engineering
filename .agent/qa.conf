# qa.conf — config for the lean quality-loop (v2).
# Read by the `quality-loop` skill and `.claude/workflows/qa-loop.js`.
# The fix oracle is NOT here — the loop reads TEST_CMD from `.agent/lifecycle.conf` (shared with the
# feature pipeline). v2 is a SINGLE grounded review pass, report-first, hard-capped so it cannot run away.

# --- The systems-under-test (space/newline separated paths, relative to repo root) ---------
# The repo's OWN tooling. check-qa-manifest.sh asserts every entry here exists.
QA_TARGETS=".agent/hooks/git-safety.sh \
.agent/hooks/secret-scan.sh \
.agent/hooks/test-gate.sh \
.agent/hooks/capture-learnings.sh \
.agent/hooks/load-memory.sh \
tests/validate.sh \
tests/check-skill-mirror.sh \
tests/check-qa-manifest.sh \
tests/check-budget.sh \
tests/budget-breaker.fixture.sh \
.claude/workflows/feature-pipeline.js \
.claude/workflows/qa-loop.js \
.claude/workflows/lib/budget-config.js \
.claude/workflows/lib/price-table.js \
.claude/workflows/lib/cost-engine.js \
.claude/workflows/lib/usage-source.js \
.claude/workflows/lib/budget-breaker.js \
.claude/workflows/lib/budget-record.js \
.claude/workflows/create-mvp.js \
tests/check-footnotes.sh"

# --- Run mode -------------------------------------------------------------------------------
# report (default) = one review pass → verify → rank → write a report → STOP. NO branch, NO code change.
# fix/autofix are reached ONLY via QA_AUTOFIX below (or the --autofix arg); a bare run never writes code.
QA_MODE=report

# --- Auto-fix gate (off by default) ---------------------------------------------------------
# Empty = report-only (safe default). Set to the severities the auto-fix lane MAY touch, e.g.
#   QA_AUTOFIX="critical"        # fix only critical
#   QA_AUTOFIX="critical,high"   # fix critical + high
# Auto-fix is RED-first, scoped, on one branch, and still honors the caps below. Prefer the per-run
# `--autofix` arg over setting it here, so writing code is always a deliberate choice.
QA_AUTOFIX=

# --- Severity bar (v2 taxonomy) -------------------------------------------------------------
# Severity order (high→low): critical > high > low > nitpick.
# QA_MIN_SEVERITY = the lowest tier surfaced as an actionable "fix" finding. DEFAULT low:
#   critical/high/low → fix tier; nitpick is ALWAYS collapsed to the backlog (count shown, details hidden).
QA_MIN_SEVERITY=low

# --- Bounds — ALWAYS ON (the runaway fix) ---------------------------------------------------
# These cap CUMULATIVE cost, not rounds (round caps don't bound a fan-out). They apply even with no
# user budget directive, because budget.spent() reports tokens regardless.
QA_MAX_FINDINGS=5       # the reviewer returns at most N candidates (precision-first); bounds verify
QA_MAX_AGENTS=10        # hard cap on total agent() calls per run → over-cap = abort + partial report
QA_TOKEN_CEILING=150000 # hard cap on tokens spent this run (budget.spent()) → abort + partial report
QA_MAX_FIXES=3          # cap on findings the auto-fix lane acts on (only when QA_AUTOFIX is set)

# Optional: a per-task notional-$ budget (spec 003). If set + a "+Nk" directive is active, the run also
# aborts at 10% remaining. Independent of the always-on caps above.
# QA_BUDGET=".agent/budget.conf"

# --- Threat model (so the reviewer doesn't invent non-bugs) ---------------------------------
# The guards protect against an honest agent's mistakes + untrusted CONTENT the agent reads, NOT a
# determined attacker. Findings that presuppose arbitrary file-write / RCE, or exotic never-occurring
# inputs, are OUT OF SCOPE and must not be reported.
QA_THREAT_MODEL="Guards protect against an honest agent's mistakes + untrusted content, NOT a determined attacker; file-write==RCE and exotic-encoding/never-concurrent edge cases are out of scope."
