# qa.conf — config for the adversarial quality-loop.
# Read by the `quality-loop` skill and `.claude/workflows/qa-loop.js`.
# The regression ORACLE is intentionally NOT here — the loop reads TEST_CMD from
# `.agent/lifecycle.conf` so the QA loop and the feature pipeline share one source of truth.

# --- The systems-under-test (space/newline separated paths, relative to repo root) ---------
# The repo's OWN tooling is the target: the guardrail hooks, the deterministic test scripts,
# and the orchestrator. check-qa-manifest.sh asserts every entry here exists.
# NOTE: tests/check-footnotes.sh lives on branch feat/check-footnotes-test-script (unmerged);
# add it here once that branch lands on main.
QA_TARGETS=".agent/hooks/git-safety.sh \
.agent/hooks/secret-scan.sh \
.agent/hooks/test-gate.sh \
.agent/hooks/capture-learnings.sh \
.agent/hooks/load-memory.sh \
tests/validate.sh \
tests/check-skill-mirror.sh \
tests/check-qa-manifest.sh \
tests/check-budget.sh \
tests/budget-breaker.fixture.sh \
.claude/workflows/feature-pipeline.js \
.claude/workflows/lib/budget-config.js \
.claude/workflows/lib/price-table.js \
.claude/workflows/lib/cost-engine.js \
.claude/workflows/lib/usage-source.js \
.claude/workflows/lib/budget-breaker.js \
.claude/workflows/lib/budget-record.js \
.claude/workflows/lib/qa-classify.js \
.claude/workflows/lib/qa-convergence.js \
.claude/workflows/lib/qa-report.js \
.claude/workflows/lib/qa-loop.harness.mjs"

# --- The adversarial lenses (each is one generate-stage agent's angle) ----------------------
QA_LENSES="boundary threat-evasion race encoding gate-false-verdict dos"

# --- Run mode (spec 004) --------------------------------------------------------------------
# report  = default: generate → verify → rank → write a ranked triage report → STOP (no branch, no
#           code change) EXCEPT a narrow auto-fix lane for unambiguous data-loss/security findings.
# fix     = scoped fix-run over a human-approved id subset (args.fix=[ids]) on one branch.
# autofix = opt-in full-auto fix of the whole fix tier (still honors ceilings + the bar).
# Absent ⇒ report-first with ceilings on (the safe default is NEVER unbounded auto-fix).
QA_MODE=report

# --- Severity / impact bar (spec 004) -------------------------------------------------------
# The lowest impact class that still reaches the FIX tier. Order (high→low):
#   data-loss > security > correctness > robustness > theoretical-edge
#   critical = data-loss,security | high = +correctness | moderate = +robustness | low = all
# DEFAULT moderate: data-loss/security/correctness/robustness → fix; theoretical-edge → backlog.
# Convergence keys on "no new finding at/above this bar" (the marginal tail can't extend the run).
QA_MIN_SEVERITY=moderate

# --- Circuit breakers / convergence ---------------------------------------------------------
QA_MAX_ROUNDS=4     # hard cap on generate→verify→(fix) rounds (cf. MAX_IMPLEMENT_ROUNDS)
QA_DRY_STREAK=2     # stop after K consecutive rounds with ZERO new AT/ABOVE-BAR findings
QA_MAX_FIXES=5      # cap on fix-tier findings acted on per run (auto-fix lane + scoped fix-run)

# --- Bounded execution: reuse spec 003's budget primitive (FR-C1) ---------------------------
# The token/notional-cost ceiling is the 003 guardrail in .agent/budget.conf, WIRED INTO qa-loop.js
# (BudgetBreaker.checkpoint() each round + after each verify/fix; break→partial report on a breach).
# Absent/disabled budget.conf ⇒ the run degrades to QA_MAX_FIXES + QA_MAX_ROUNDS (+ wallclock) only.
QA_BUDGET=".agent/budget.conf"
# QA_WALLCLOCK=30   # optional wall-clock ceiling in minutes (deterministic start via args)

# --- Fast fix-gate: directly-affected checks per fix (FR-D1) --------------------------------
# "target:check[,check] target2:check ..." — the checks a fix to <target> must re-run per iteration
# (the new regression case always runs too). Unmapped targets fall back to the target's own self-test.
# The FULL TEST_CMD runs ONCE at end-of-fix-run, never per fix. Unset ⇒ self-test fallback for all.
# QA_AFFECTED_MAP="tests/validate.sh:tests/check-qa-manifest.sh,tests/check-budget.sh"

# --- Threat model (stated so generators don't waste effort on non-boundaries) ---------------
# An actor who can already write tracked files in this repo already has code execution; the
# hooks are guardrails against an honest agent's mistakes + untrusted CONTENT the agent reads
# (the lethal trifecta), NOT a sandbox against a malicious local user. Findings that presuppose
# arbitrary file-write / RCE (e.g. "inject shell via guardrails.conf") are OUT OF SCOPE.
QA_THREAT_MODEL="file-write == RCE is out of scope; target false-negatives (evasions), false gate verdicts, untrusted-content handling, and robustness (paths-with-spaces, encoding, concurrency)."
