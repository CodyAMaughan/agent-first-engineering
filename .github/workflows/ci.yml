name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    name: Build site + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install -r requirements.txt

      - name: Build site (strict — fails on broken links/footnotes)
        run: mkdocs build --strict

      - name: Validate every quiz.json
        run: |
          set -e
          for f in docs/curriculum/*/quiz.json; do
            python -c "import json; json.load(open('$f'))" && echo "ok  $f"
          done

      - name: Check external links (advisory)
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: --no-progress --max-concurrency 4 'docs/**/*.md' 'README.md'
          fail: false
